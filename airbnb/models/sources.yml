version: 1


sources:
  - name: airbnb
    schema: raw
    tables:
      - name: listings
        identifier: raw_listings
      
      - name: hosts
        identifier: raw_hosts

      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date # name of the column
          freshness: 
            warn_after: {count: 1, period: hour}
            error_after: {count: 24, period: hour}